name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  typescript-tests:
    name: TypeScript Tests & Build
    runs-on: ubuntu-latest
    env:
      # Empty env vars — CI must not require live production infrastructure
      NEXT_PUBLIC_SUPABASE_URL: ""
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ""
      SUPABASE_SERVICE_ROLE_KEY: ""
      PHARMAGUARD_INGEST_KEY: ""
      UPSTASH_REDIS_REST_URL: ""
      UPSTASH_REDIS_REST_TOKEN: ""
      UPSTASH_VECTOR_REST_URL: ""
      UPSTASH_VECTOR_REST_TOKEN: ""
      EMBEDDING_API_KEY: ""
      EMBEDDING_BASE_URL: ""
      EMBEDDING_MODEL: ""
      AI_PROVIDER: ""
      AI_API_KEY: ""
      AI_BASE_URL: ""
      AI_MODEL: ""
      NEXT_PUBLIC_URL: ""
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript tests (excluding smoke)
        run: npm test

      - name: Build
        run: npm run build

  python-tests:
    name: Python SDK Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: integrations/botcity
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Run Python tests
        run: python -m pytest tests/ -v
